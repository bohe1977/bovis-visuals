<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="보비스가 만든 인터랙티브 HTML 시각화 모음">
  <title>Bovis Visuals</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b12;
      --panel: rgba(19, 25, 39, 0.78);
      --line: rgba(148, 163, 184, 0.18);
      --text: #eef2ff;
      --muted: #94a3b8;
      --accent: #67e8f9;
      --accent-2: #a78bfa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(103, 232, 249, .12), transparent 32rem),
        radial-gradient(circle at 85% 25%, rgba(167, 139, 250, .14), transparent 30rem),
        var(--bg);
    }
    main { width: min(1080px, calc(100% - 40px)); margin: 0 auto; padding: 96px 0 72px; }
    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--accent);
      background: rgba(103, 232, 249, .05);
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 { margin: 24px 0 18px; font-size: clamp(48px, 9vw, 96px); line-height: .95; letter-spacing: -.055em; }
    h1 span {
      color: transparent;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      background-clip: text;
      -webkit-background-clip: text;
    }
    .intro { max-width: 680px; margin: 0; color: var(--muted); font-size: clamp(18px, 2.5vw, 24px); line-height: 1.65; }
    .section-head { display: flex; justify-content: space-between; align-items: end; gap: 20px; margin: 88px 0 20px; }
    h2 { margin: 0; font-size: 24px; }
    .count { color: var(--muted); font-size: 14px; }
    .empty {
      position: relative;
      overflow: hidden;
      padding: 46px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .3);
      backdrop-filter: blur(18px);
    }
    .empty::after {
      content: "";
      position: absolute;
      width: 190px;
      height: 190px;
      right: -70px;
      bottom: -90px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(103,232,249,.28), rgba(167,139,250,.25));
      filter: blur(12px);
    }
    .empty strong { display: block; margin-bottom: 10px; font-size: 20px; }
    .empty p { max-width: 560px; margin: 0; color: var(--muted); line-height: 1.7; }
    footer { margin-top: 64px; color: #64748b; font-size: 13px; }
    @media (max-width: 600px) {
      main { width: min(100% - 28px, 1080px); padding-top: 64px; }
      .empty { padding: 30px 24px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">● Public visualization archive</div>
    <h1>Bovis<br><span>Visuals.</span></h1>
    <p class="intro">데이터와 아이디어를 이해하기 쉬운 인터랙티브 HTML로 바꾸는 공개 시각화 아카이브입니다.</p>

    <div class="section-head">
      <h2>시각화</h2>
      <span class="count">0 projects</span>
    </div>
    <section class="empty" aria-label="시각화 준비 중">
      <strong>첫 번째 시각화를 준비하고 있습니다.</strong>
      <p>정주형님이 보비스에게 “시각화”를 요청하면 결과물이 이곳에 공개되고, 바로 열어볼 수 있는 링크가 추가됩니다.</p>
    </section>

    <footer>Built with Bovis · Hosted on GitHub Pages</footer>
  </main>
</body>
</html>
