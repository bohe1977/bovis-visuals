<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="보비스가 만든 인터랙티브 HTML 시각화 모음">
  <title>Bovis Visuals</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b12;
      --panel: rgba(19, 25, 39, 0.78);
      --line: rgba(148, 163, 184, 0.18);
      --text: #eef2ff;
      --muted: #94a3b8;
      --accent: #67e8f9;
      --accent-2: #a78bfa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(103, 232, 249, .12), transparent 32rem),
        radial-gradient(circle at 85% 25%, rgba(167, 139, 250, .14), transparent 30rem),
        var(--bg);
    }
    main { width: min(1080px, calc(100% - 40px)); margin: 0 auto; padding: 96px 0 72px; }
    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--accent);
      background: rgba(103, 232, 249, .05);
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 { margin: 24px 0 18px; font-size: clamp(48px, 9vw, 96px); line-height: .95; letter-spacing: -.055em; }
    h1 span {
      color: transparent;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      background-clip: text;
      -webkit-background-clip: text;
    }
    .intro { max-width: 680px; margin: 0; color: var(--muted); font-size: clamp(18px, 2.5vw, 24px); line-height: 1.65; }
    .section-head { display: flex; justify-content: space-between; align-items: end; gap: 20px; margin: 88px 0 20px; }
    h2 { margin: 0; font-size: 24px; }
    .count { color: var(--muted); font-size: 14px; }
    .empty {
      position: relative;
      overflow: hidden;
      padding: 46px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .3);
      backdrop-filter: blur(18px);
    }
    .empty::after {
      content: "";
      position: absolute;
      width: 190px;
      height: 190px;
      right: -70px;
      bottom: -90px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(103,232,249,.28), rgba(167,139,250,.25));
      filter: blur(12px);
    }
    .empty strong { display: block; margin-bottom: 10px; font-size: 20px; }
    .empty p { max-width: 560px; margin: 0; color: var(--muted); line-height: 1.7; }
    .projects { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; }
    .project-card {
      position: relative;
      overflow: hidden;
      min-height: 310px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      color: var(--text);
      text-decoration: none;
      background:
        radial-gradient(circle at 86% 18%, rgba(251, 146, 60, .28), transparent 9rem),
        linear-gradient(145deg, rgba(76, 29, 20, .9), rgba(19, 25, 39, .95));
      box-shadow: 0 24px 80px rgba(0, 0, 0, .3);
      transition: transform .22s ease, border-color .22s ease;
    }
    .project-card:hover { transform: translateY(-5px); border-color: rgba(251, 146, 60, .7); }
    .project-card .meta { display: flex; justify-content: space-between; gap: 16px; color: #fdba74; font-size: 12px; font-weight: 700; letter-spacing: .05em; }
    .project-card .icon { display: block; margin: 40px 0 20px; font-size: 56px; filter: drop-shadow(0 10px 18px rgba(0,0,0,.22)); }
    .project-card h3 { margin: 0 0 12px; font-size: 30px; letter-spacing: -.04em; }
    .project-card p { max-width: 500px; margin: 0; color: #cbd5e1; line-height: 1.65; }
    .project-card .open { display: inline-block; margin-top: 24px; color: #fed7aa; font-size: 14px; font-weight: 750; }
    footer { margin-top: 64px; color: #64748b; font-size: 13px; }
    @media (max-width: 600px) {
      main { width: min(100% - 28px, 1080px); padding-top: 64px; }
      .empty { padding: 30px 24px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">● Public visualization archive</div>
    <h1>Bovis<br><span>Visuals.</span></h1>
    <p class="intro">데이터와 아이디어를 이해하기 쉬운 인터랙티브 HTML로 바꾸는 공개 시각화 아카이브입니다.</p>

    <div class="section-head">
      <h2>시각화</h2>
      <span class="count">1 project</span>
    </div>
    <section class="projects" aria-label="공개 시각화 목록">
      <a class="project-card" href="2026-07-18-myeongil-restaurants/">
        <div class="meta"><span>LOCAL GUIDE · FOOD</span><time datetime="2026-07-18">2026.07.18</time></div>
        <span class="icon" aria-hidden="true">🍜</span>
        <h3>명일동 맛집 10선</h3>
        <p>네이버·다이닝코드·Google 지도에서 상호와 주소를 교차 확인한 동네 맛집 10곳. 플랫폼 점수를 섞지 않고 평가 수와 출처를 함께 보여줍니다.</p>
        <span class="open">시각화 열기 →</span>
      </a>
    </section>

    <footer>Built with Bovis · Hosted on GitHub Pages</footer>
  </main>
</body>
</html>
