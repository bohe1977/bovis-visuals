<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="관심 MLB 선수 기록과 LA 다저스·샌프란시스코 자이언츠 경기 결과를 세 출처로 교차검증한 데일리 리포트">
  <title>MLB 선수·주요 팀 데일리 리포트 · BOVIS</title>
  <style>
    :root{--ink:#171717;--body:#4d4d4d;--muted:#737373;--line:#e9e9e9;--soft:#f7f7f7;--blue:#0672e5;--green:#13795b;--green-bg:#eff8f4;--amber:#8a5d00;--amber-bg:#fff8e6;--red:#9b2c2c}
    *{box-sizing:border-box}html{background:#fff;color:var(--ink);overflow-x:hidden}body{margin:0;font-family:Geist,Pretendard,"Noto Sans KR",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:#fff;-webkit-font-smoothing:antialiased}.wrap{width:min(1120px,calc(100% - 40px));margin-inline:auto}a{color:inherit}
    header{height:62px;border-bottom:1px solid var(--line);display:flex;align-items:center}.nav{display:flex;align-items:center;justify-content:space-between;gap:20px}.brand{font-weight:680;letter-spacing:-.035em;text-decoration:none}.date{color:var(--muted);font:500 12px/1.3 ui-monospace,"Geist Mono",monospace;white-space:nowrap}
    main{padding:72px 0 80px}.hero{max-width:800px;margin-inline:auto;text-align:center}.eyebrow{margin:0 0 14px;color:var(--blue);font:650 12px/1.3 ui-monospace,"Geist Mono",monospace;letter-spacing:.055em}.hero h1{margin:0;font-size:clamp(34px,6vw,50px);line-height:1.08;letter-spacing:-.05em;word-break:keep-all}.hero p{max-width:680px;margin:18px auto 0;color:var(--body);font-size:16px;line-height:1.65;word-break:keep-all}
    .section{margin-top:58px}.section-head{display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:18px}.section-head h2{margin:0;font-size:22px;letter-spacing:-.035em}.section-head span{color:var(--muted);font-size:12px}.card{min-width:0;padding:24px;border-radius:14px;background:#fff;box-shadow:rgba(0,0,0,.08) 0 0 0 1px,rgba(0,0,0,.04) 0 2px 8px}
    .game-top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px}.status,.venue{font-size:12px}.venue{color:var(--muted)}.scoreboard{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;gap:18px;text-align:center}.club{display:flex;align-items:center;gap:8px;min-width:0}.club.away{justify-content:flex-end;flex-direction:row-reverse;text-align:right}.club.home{justify-content:flex-start;text-align:left}.club-name{font-size:22px;font-weight:650;letter-spacing:-.03em;word-break:keep-all}.win{padding:4px 7px;border-radius:6px;background:var(--green-bg);color:var(--green);font-size:11px;font-weight:700;white-space:nowrap}.score{display:flex;align-items:center;gap:12px;font:680 36px/1 ui-monospace,"Geist Mono",monospace;letter-spacing:-.04em}.score i{color:#c7c7c7;font-style:normal;font-weight:400}.team-line{display:flex;justify-content:center;gap:9px 14px;flex-wrap:wrap;margin-top:18px}.team-line span{padding:5px 8px;border-radius:6px;background:var(--soft);color:var(--body);font-size:12px}.headline{margin:22px 0 0;padding-top:20px;border-top:1px solid var(--line);font-size:18px;font-weight:650;line-height:1.5;letter-spacing:-.02em}.label{display:block;margin:22px 0 10px;color:var(--muted);font:650 11px/1.3 ui-monospace,"Geist Mono",monospace;letter-spacing:.04em}.points{margin:0;padding-left:19px;color:var(--body);font-size:14px;line-height:1.68}.points li+li{margin-top:7px}.effort{margin-top:16px;padding:14px 15px;border-radius:10px;background:var(--soft);color:var(--body);font-size:13px;line-height:1.6}.effort strong{color:var(--ink)}
    .player-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.player-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px}.identity{min-width:0}.identity-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.identity h3{margin:0;font-size:21px;letter-spacing:-.03em}.team{padding:4px 7px;border-radius:6px;background:var(--soft);color:var(--muted);font-size:11px}.note{margin:8px 0 0;color:var(--body);font-size:12px;line-height:1.55;word-break:keep-all}.state{flex:0 0 auto;padding:5px 8px;border-radius:7px;background:var(--green-bg);color:var(--green);font-size:11px;font-weight:700;white-space:nowrap}.state.inactive{background:var(--amber-bg);color:var(--amber)}
    .stat-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}.stat{min-width:0;padding:14px 7px;background:#fff;text-align:center}.stat strong{display:block;font:650 15px/1.15 ui-monospace,"Geist Mono",monospace;white-space:nowrap}.stat span{display:block;margin-top:6px;color:var(--muted);font-size:10px;white-space:nowrap}.pitchers .stat-grid{grid-template-columns:repeat(5,minmax(0,1fr))}.pitcher-active{display:grid;gap:14px}.inactive-pitchers{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}.inactive-row{display:flex;align-items:center;justify-content:space-between;gap:16px;min-height:54px;padding:12px 14px;border:1px solid var(--line);border-radius:10px}.inactive-row strong{font-size:14px}.inactive-row small{margin-left:7px;color:var(--muted)}.none{color:var(--muted);font-size:12px;white-space:nowrap}
    .verification{margin-top:58px;padding:22px 24px;border-radius:12px;background:var(--soft)}.verification h2{margin:0;font-size:17px}.verification p,.verification li{color:var(--body);font-size:13px;line-height:1.65}.verification p{margin:9px 0 0}.verification ul{margin:9px 0 0;padding-left:19px}.source-links{display:flex;flex-wrap:wrap;gap:4px 18px;margin-top:14px}.source-links a{min-height:38px;display:inline-flex;align-items:center;color:var(--blue);font-size:12px;text-underline-offset:3px}
    .error{margin-top:46px;padding:20px;border:1px solid var(--line);border-radius:12px;color:var(--red);text-align:center}footer{margin-top:42px;padding-top:20px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:20px;color:var(--muted);font-size:11px;line-height:1.6}
    @media(max-width:800px){.wrap{width:min(100% - 28px,1120px)}main{padding-top:54px}.player-grid{grid-template-columns:1fr}.inactive-pitchers{grid-template-columns:1fr}.scoreboard{gap:10px}.club-name{font-size:19px}.score{font-size:30px;gap:9px}}
    @media(max-width:430px){.card{padding:19px}.stat-grid,.pitchers .stat-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.pitchers .stat:last-child:nth-child(odd){grid-column:1/-1}.section-head{align-items:center}.section-head span{display:none}.player-head{flex-direction:column}.scoreboard{grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:7px}.club{gap:5px}.club.away{justify-content:flex-end;text-align:right}.club.home{justify-content:flex-start;text-align:left}.club-name{font-size:16px}.win{padding:3px 5px;font-size:10px}.score{font-size:27px;gap:6px}.headline{font-size:17px}footer{flex-direction:column}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto!important;transition:none!important;animation:none!important}}
  </style>
</head>
<body>
  <header><nav class="nav wrap"><a class="brand" href="../">Bovis Visuals</a><time class="date" id="nav-date">MLB DAILY</time></nav></header>
  <main class="wrap">
    <section class="hero"><p class="eyebrow">MLB · DAILY PLAYER & TEAM REPORT</p><h1>MLB 관심 선수와<br>주요 팀 경기 결과</h1><p id="hero-copy">MLB 공식·네이버스포츠·다음스포츠를 대조한 일일 기록입니다.</p></section>
    <div id="report" aria-live="polite"></div>
    <footer><span>BOVIS · MLB PLAYER WATCH</span><span id="generated"></span></footer>
  </main>
  <script>
    const esc = value => String(value ?? '—').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const metric = (value,label) => `<div class="stat"><strong>${esc(value)}</strong><span>${esc(label)}</span></div>`;
    const dateKo = value => { const [y,m,d]=value.split('-'); return `${y}년 ${Number(m)}월 ${Number(d)}일`; };
    fetch('./data.json', {cache:'no-store'}).then(r => {if(!r.ok) throw new Error('data'); return r.json();}).then(data => {
      document.title=`${data.report_date_kst} MLB 선수·주요 팀 리포트 · BOVIS`;
      const allFinal=data.team_games.every(g=>g.status==='경기 종료');
      document.getElementById('nav-date').textContent=`${data.report_date_kst.replaceAll('-','.')} · ${allFinal?'FINAL':'UPDATE'}`;
      document.getElementById('hero-copy').textContent=`${dateKo(data.report_date_kst)} KST 경기 기준. 선수 일일 기록과 시즌 누계, 다저스·샌프란시스코 경기 핵심을 한 화면에 정리했습니다.`;
      const gameSections=data.team_games.map((g,index)=>{const awayWin=g.winner_side==='away'?'<span class="win">승리</span>':'';const homeWin=g.winner_side==='home'?'<span class="win">승리</span>':'';const scoreReady=g.away_score!==null&&g.away_score!==undefined&&g.home_score!==null&&g.home_score!==undefined;const score=scoreReady?`<div class="scoreboard"><div class="club away"><span class="club-name">${esc(g.away)}</span>${awayWin}</div><div class="score"><span>${g.away_score}</span><i>:</i><span>${g.home_score}</span></div><div class="club home"><span class="club-name">${esc(g.home)}</span>${homeWin}</div></div><div class="team-line"><span>안타 ${g.away_hits}–${g.home_hits}</span><span>실책 ${g.away_errors}–${g.home_errors}</span><span>승 ${esc(g.winner_pitcher)}</span><span>패 ${esc(g.loser_pitcher)}</span>${g.save_pitcher?`<span>세 ${esc(g.save_pitcher)}</span>`:''}</div>`:'';return `<section class="section" aria-labelledby="team-game-${index}"><div class="section-head"><h2 id="team-game-${index}">${esc(g.section_title)}</h2><span>${g.status==='경기 종료'?'FINAL · 3 SOURCES VERIFIED':'STATUS UPDATE'}</span></div><article class="card" data-report-game><div class="game-top"><span class="status">${esc(g.status)}</span><span class="venue">${esc(g.venue)} · ${esc(g.start_time_kst)} KST</span></div>${score}<p class="headline">${esc(g.headline)}</p><span class="label">GAME POINTS</span><ul class="points">${g.points.map(x=>`<li>${esc(x)}</li>`).join('')}</ul><div class="effort"><strong>${esc(g.opponent_label)}</strong> · ${esc(g.opponent_effort)}</div></article></section>`}).join('');
      const batterCards=data.batters.map(p=>`<article class="card" data-report-card data-player="${esc(p.name)}"><div class="player-head"><div class="identity"><div class="identity-line"><h3>${esc(p.name)}</h3><span class="team">${esc(p.team)}</span></div><p class="note">${esc(p.daily_note)}</p></div><span class="state ${p.status==='출전'?'':'inactive'}">${esc(p.status)}</span></div><div class="stat-grid">${metric(p.at_bats,'타수')}${metric(p.hits,'안타')}${metric(p.rbi,'타점')}${metric(p.runs,'득점')}${metric(p.home_runs,'홈런')}${metric(p.walks,'볼넷')}${metric(p.strikeouts,'삼진')}${metric(p.avg,'시즌 타율')}${metric(p.obp,'출루율')}${metric(p.ops,'OPS')}</div></article>`).join('');
      const activePitchers=data.pitchers.filter(p=>p.appeared);
      const inactivePitchers=data.pitchers.filter(p=>!p.appeared);
      const pitcherCards=activePitchers.map(p=>`<article class="card" data-report-card data-player="${esc(p.name)}"><div class="player-head"><div class="identity"><div class="identity-line"><h3>${esc(p.name)}</h3><span class="team">${esc(p.team)}</span></div>${p.reason?`<p class="note">${esc(p.reason)}</p>`:''}</div><span class="state">${esc(p.status)}</span></div><div class="stat-grid">${metric(p.daily_innings,'이닝')}${metric(p.daily_hits,'피안타')}${metric(p.daily_runs,'실점')}${metric(p.daily_earned_runs,'자책')}${metric(p.daily_walks_hbp,'4사구')}${metric(p.daily_strikeouts,'삼진')}${metric(p.daily_home_runs,'피홈런')}${metric(p.daily_pitches,'투구수')}${metric(p.era,'시즌 ERA')}</div></article>`).join('');
      const inactivePitcherRows=inactivePitchers.map(p=>`<div class="inactive-row" data-report-card data-player="${esc(p.name)}"><span><strong>${esc(p.name)}</strong><small>${esc(p.team)}</small></span><span class="none">등판 없음</span></div>`).join('');
      const links=[...data.team_games.flatMap(g=>[[`MLB 공식 · ${g.section_title.replace(' 경기','')}`,`https://statsapi.mlb.com/api/v1/game/${g.game_pk}/boxscore`],[`네이버 · ${g.away}–${g.home}`,`https://m.sports.naver.com/game/${g.naver_game_id}/record`],[`다음 · ${g.away}–${g.home}`,`https://sports.daum.net/match/${g.daum_game_id}`]]),['네이버 · 전체 일정',`https://m.sports.naver.com/wbaseball/schedule/index?category=mlb&date=${data.report_date_kst}`],['다음 · 전체 일정',`https://sports.daum.net/schedule/mlb?date=${data.report_date_kst.replaceAll('-','')}`]];
      document.getElementById('report').innerHTML=`
        ${gameSections}
        <section class="section pitchers" aria-labelledby="pitchers"><div class="section-head"><h2 id="pitchers">투수</h2><span>등판 ${activePitchers.length} · 등판 없음 ${inactivePitchers.length}</span></div>${pitcherCards?`<div class="pitcher-active">${pitcherCards}</div>`:''}${inactivePitcherRows?`<div class="inactive-pitchers" aria-label="등판하지 않은 투수">${inactivePitcherRows}</div>`:''}</section>
        <section class="section" aria-labelledby="batters"><div class="section-head"><h2 id="batters">타자</h2><span>출전 6 · MLB 출전 없음 2</span></div><div class="player-grid">${batterCards}</div></section>
        <section class="verification"><h2>교차검증 완료</h2><p>${esc(data.verification.method)}</p><ul>${data.verification.notes.map(x=>`<li>${esc(x)}</li>`).join('')}</ul><div class="source-links">${links.map(([label,url])=>`<a href="${esc(url)}" target="_blank" rel="noopener">${esc(label)} ↗</a>`).join('')}</div></section>`;
      const t=new Date(data.generated_at); document.getElementById('generated').textContent=`${new Intl.DateTimeFormat('ko-KR',{timeZone:'Asia/Seoul',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).format(t)} KST 생성`;
    }).catch(()=>{document.getElementById('report').innerHTML='<p class="error">데이터를 불러오지 못했습니다.</p>';});
  </script>
</body>
</html>
